---
extends: default

# https://yamllint.readthedocs.io/en/stable/rules.html
ignore-from-file: .gitignore

rules:
  comments: disable
  braces: disable
  document-start: disable
  empty-lines:
    level: warning
  indentation:
    spaces: consistent
  line-length: disable
  truthy:
    allowed-values: ["true", "false", "on"]
