# Override config for changed-files mode: skip REPOSITORY-scoped linters.
#
# Inherits everything from .mega-linter.yml via EXTENDS, then REPLACES the
# ENABLE_LINTERS list with one that omits all REPOSITORY_* entries.
#
# WHY replace instead of using DISABLE_LINTERS?
# MegaLinter's activation logic (Linter.manage_activation) uses an elif
# chain: ENABLE_LINTERS is checked BEFORE DISABLE_LINTERS. Any linter
# present in ENABLE_LINTERS is activated unconditionally — DISABLE_LINTERS
# is never evaluated for it. The only way to suppress linters that appear
# in the parent's ENABLE_LINTERS is to provide a replacement list here.
#
# MAINTENANCE: when you add or remove a linter in .mega-linter.yml's
# ENABLE_LINTERS, update this list to match (minus the REPOSITORY_* entries).

EXTENDS: .mega-linter.yml

ENABLE_LINTERS:
  # Core Languages
  - BASH_SHELLCHECK
  - BASH_SHFMT
  - PYTHON_RUFF
  - PYTHON_ISORT

  # Configuration File Formats
  - JSON_JSONLINT
  - YAML_YAMLLINT
  - YAML_PRETTIER
  - MARKDOWN_MARKDOWNLINT
  - MARKDOWN_MARKDOWN_LINK_CHECK
  - MARKDOWN_MARKDOWN_TABLE_FORMATTER
  - EDITORCONFIG_EDITORCONFIG_CHECKER

  # Infrastructure-as-Code
  - ACTION_ACTIONLINT
  - DOCKERFILE_HADOLINT
  - KUBERNETES_KUBECONFORM
  - TERRAFORM_TFLINT
  - CLOUDFORMATION_CFN_LINT

  # Code Quality & Documentation
  - COPYPASTE_JSCPD
