# Gitleaks configuration (shared template)
# Automatically discovered by gitleaks when placed in the workspace root.
# Docs: https://github.com/gitleaks/gitleaks#configuration
#
# Target repos can override this by placing their own .gitleaks.toml at
# the repo root. The runner skips overlay when the target already has
# a file with the same name.

[extend]
useDefault = true

[allowlist]
paths = [
  '''(^|/)\.cache/''',
  '''(^|/)custom-flavor/''',
]
