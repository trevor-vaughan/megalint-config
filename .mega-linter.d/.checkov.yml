# Checkov configuration file (shared template)
# Automatically passed to Checkov via --config-file by MegaLinter.
# Docs: https://www.checkov.io/2.Basics/CLI%20Command%20Reference.html
#
# Target repos can override this by placing their own .checkov.yml at
# the repo root. The runner skips overlay when the target already has
# a file with the same name.
#
# To generate a config from CLI flags:
#   checkov --create-config .checkov.yml [flags...]

# Skip frameworks that scan remote VCS configuration over the GitHub API
# (branch protection, org settings) rather than local files. Checkov persists
# their responses to a transient conf dir under the working directory; the
# MegaLinter runner mounts the workspace read-only, so that persist crashes
# with EROFS ("Read-only file system: '.megalinter_github_conf'"). These
# frameworks lint no local source, so skipping them is pure gain.
skip-framework:
  - github_configuration

# Paths to skip (regex, relative to working directory).
skip-path:
  - .cache
