version: "3"

# MEGALINTER_IMAGE (full image reference) defaults per-task, not here: Task
# merges every include's top-level vars into one shared map, so a top-level
# default would globally clobber flavor.yml's different default (last include
# wins). The default below is duplicated across pull/verify/run so each is
# correct when invoked standalone; a CLI override still wins everywhere.
vars:
  TARGET: "{{.TARGET | default .ROOT_DIR}}"
  APPLY_FIXES: '{{.APPLY_FIXES | default "none"}}'
  PULL_POLICY: '{{.PULL_POLICY | default "never"}}'
  MEGALINT_VERIFY: '{{.MEGALINT_VERIFY | default ""}}'

tasks:
  default:
    cmds:
      - task: run

  pull:
    desc: Pull the megalinter image (set FORCE=1 to re-pull when already present)
    prompt: The megalinter image is large (~3 GB). Do you want to continue?
    vars:
      FORCE: '{{.FORCE | default ""}}'
      MEGALINTER_IMAGE: '{{.MEGALINTER_IMAGE | default "ghcr.io/trevor-vaughan/megalinter-custom-flavor:latest"}}'
    status:
      - test -z "{{.FORCE}}" && {{.CONTAINER_ENGINE}} image inspect {{.MEGALINTER_IMAGE}} >/dev/null 2>&1
    cmds:
      - "{{.CONTAINER_ENGINE}} pull {{.MEGALINTER_IMAGE}}"

  verify:
    desc: "Verify attestations on the pulled MegaLinter image using cosign"
    deps: [pull]
    vars:
      MEGALINTER_IMAGE: '{{.MEGALINTER_IMAGE | default "ghcr.io/trevor-vaughan/megalinter-custom-flavor:latest"}}'
    env:
      MEGALINT_VERIFY: "{{.MEGALINT_VERIFY}}"
    cmd: bash "{{.TASKFILE_DIR}}/scripts/megalint-verify.sh" "{{.MEGALINTER_IMAGE}}"

  run:
    desc: "Run MegaLinter against TARGET (default: this repo). APPLY_FIXES=all to auto-fix."
    deps: [verify]
    vars:
      MEGALINTER_IMAGE: '{{.MEGALINTER_IMAGE | default "ghcr.io/trevor-vaughan/megalinter-custom-flavor:latest"}}'
      VALIDATE_ALL_CODEBASE: '{{.VALIDATE_ALL_CODEBASE | default ""}}'
      CONFIG_FILE: '{{.CONFIG_FILE | default ""}}'
      ENABLE_LINTERS: '{{.ENABLE_LINTERS | default ""}}'
    # VALIDATE_ALL_CODEBASE is forwarded as an env var because the runner
    # script checks for it. Other common vars (TARGET, APPLY_FIXES,
    # PULL_POLICY) are defined at the top level and accessible to all tasks.
    env:
      VALIDATE_ALL_CODEBASE: "{{.VALIDATE_ALL_CODEBASE}}"
      ENABLE_LINTERS: "{{.ENABLE_LINTERS}}"
    cmds:
      # Chunk the SARIF for LLM-driven remediation after every run. `defer`
      # runs regardless of the lint result, so findings stay processable
      # even when the lint exits non-zero. sarif-chunk no-ops gracefully
      # when no SARIF was produced.
      - defer: { task: sarif-chunk }
      - >-
        bash "{{.TASKFILE_DIR}}/scripts/megalint-run.sh"
        "{{.ROOT_DIR}}"
        "{{.TARGET}}"
        "{{.CONTAINER_ENGINE}}"
        "{{.MEGALINTER_IMAGE}}"
        "{{.APPLY_FIXES}}"
        "{{.PULL_POLICY}}"
        "{{.CONFIG_FILE}}"

  changed:
    desc: "Run MegaLinter only on files changed vs. the default branch (HEAD diff). Strips repository-scoped linters (derived from .mega-linter.yml). Honours TARGET, APPLY_FIXES, PULL_POLICY, and .mega-linter.local.yml."
    vars:
      # Derive full minus REPOSITORY_* from the shared config and inject it as
      # ENABLE_LINTERS. Using the normal entry (local -> shared) means
      # .mega-linter.local.yml is honoured on changed runs too.
      ENABLE_LINTERS_CHANGED:
        sh: bash "{{.TASKFILE_DIR}}/scripts/changed-enable-linters.sh" "{{.ROOT_DIR}}/.mega-linter.yml"
    cmds:
      - task: run
        vars:
          VALIDATE_ALL_CODEBASE: "false"
          ENABLE_LINTERS: "{{.ENABLE_LINTERS_CHANGED}}"

  sarif-open:
    desc: "Filter SARIF report to only include runs with findings (honours TARGET)"
    cmds:
      - echo "Filtering SARIF report to only show linters with findings..."
      - jq '. | .runs = [.runs[] | select((.results // []) | length > 0)]' "{{.TARGET}}/megalinter-reports/megalinter-report.sarif" > "{{.TARGET}}/megalinter-reports/megalinter-report-open.sarif"
      - echo "Filtered SARIF report written to {{.TARGET}}/megalinter-reports/megalinter-report-open.sarif"

  sarif-chunk:
    desc: "Split SARIF report into per-linter markdown files for LLM consumption (honours TARGET)"
    cmd: bash "{{.TASKFILE_DIR}}/scripts/megalint-sarif-chunk.sh" "{{.TARGET}}"
