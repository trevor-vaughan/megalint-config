---
# Reusable MegaLinter job template using the shared config from
# trevor-vaughan/megalint-config.
#
# Caller usage in their own .gitlab-ci.yml:
#
#   include:
#     - remote: 'https://raw.githubusercontent.com/trevor-vaughan/megalint-config/latest/ci/gitlab/megalint.yml'
#
#   megalint:
#     extends: .megalint
#     variables:
#       MEGALINT_REF: 'latest'   # MUST match the ref in include: above
#       # Optional: cache via GitLab Dependency Proxy
#       MEGALINTER_IMAGE: '${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/trevor-vaughan/megalinter-custom-flavor:latest'
#
# Per-event policy (validate all vs. PR diff only) is set via rules:
# see ci/gitlab/README.md for the full caller example.

.megalint:
  image: "docker:27"
  services:
    - "docker:27-dind"
  variables:
    MEGALINT_WORKING_DIRECTORY: "$CI_PROJECT_DIR"
    MEGALINT_VALIDATE_ALL_CODEBASE: "false"
    MEGALINTER_IMAGE: "ghcr.io/trevor-vaughan/megalinter-custom-flavor:latest"
    MEGALINT_REPORTS_DIR: "$CI_PROJECT_DIR/megalinter-reports"
    MEGALINT_PULL_POLICY: "missing"
    MEGALINT_VERIFY: ""
    # Pin to match the include: ref. Override in the caller if the
    # include ref differs.
    MEGALINT_REF: "latest"
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache bash git curl coreutils
    - git clone --depth 1 --branch "$MEGALINT_REF"
      https://github.com/trevor-vaughan/megalint-config.git
      /tmp/megalint-runner
  script:
    - bash /tmp/megalint-runner/ci/gitlab/run.sh
  artifacts:
    when: always
    paths:
      - "$MEGALINT_REPORTS_DIR"
      # Fallback: catch the log if MegaLinter crashed before reports-dir
      # was written and run.sh couldn't move it into reports-dir.
      - "$MEGALINT_WORKING_DIRECTORY/mega-linter.log"
    reports:
      sast: "$MEGALINT_REPORTS_DIR/megalinter-report.sarif"
