---
name: MegaLinter Dogfooding

"on":
  # Pull requests are the only diff-linting trigger. A push trigger is
  # deliberately omitted: pushes to a feature branch are already covered by
  # that branch's pull request (a push trigger would lint the same commit
  # twice), while pushes to `main` and tag pushes lint zero changed files
  # (diff base == head) and emit an empty-runs SARIF that fails code-scanning
  # upload. The weekly schedule refreshes `main`'s Code Scanning baseline.
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays at 6 AM UTC — full-scan baseline for main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # Pulling the full MegaLinter image to dogfood the repo consumes many
      # GB and can exhaust the ~14 GB free on a stock ubuntu-latest runner.
      # Reclaim ~20+ GB by removing preinstalled runtimes and toolchains this
      # job never uses; tool-cache is kept (action default).
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1

      - name: Compute cache week
        id: week
        shell: bash
        run: echo "week=$(date -u '+%G-W%V')" >> "$GITHUB_OUTPUT"

      - name: Restore vuln-db cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/megalint/vuln-db
          key: vuln-db-${{ runner.os }}-${{ steps.week.outputs.week }}
          restore-keys: |
            vuln-db-${{ runner.os }}-

      - name: Run MegaLinter via local composite action
        id: megalint
        uses: ./
        with:
          validate-all-codebase: ${{ github.event_name == 'schedule' }}
          vuln-cache-dir: ~/.cache/megalint/vuln-db
          github-comment: "true"

      - name: Upload MegaLinter reports
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: megalinter-reports
          path: |
            ${{ steps.megalint.outputs.reports-dir }}
            mega-linter.log

      - name: Upload SARIF to GitHub Code Scanning
        # Skip when the SARIF has no runs: GitHub's upload API rejects an
        # empty-runs report ("1 item required; only 0 were supplied").
        if: ${{ (success() || failure()) && steps.megalint.outputs.sarif-has-results == 'true' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.megalint.outputs.sarif-file }}
