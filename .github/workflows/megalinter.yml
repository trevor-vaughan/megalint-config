---
name: MegaLinter

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run MegaLinter via local composite action
        id: megalint
        uses: ./
        with:
          validate-all-codebase: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Upload MegaLinter reports
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: megalinter-reports
          path: |
            ${{ steps.megalint.outputs.reports-dir }}
            mega-linter.log

      - name: Upload SARIF to GitHub Code Scanning
        if: ${{ success() || failure() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.megalint.outputs.sarif-file }}
