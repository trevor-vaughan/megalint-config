---
name: MegaLinter Dogfooding

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays at 6 AM UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Compute cache week
        id: week
        shell: bash
        run: echo "week=$(date -u '+%Y-W%V')" >> "$GITHUB_OUTPUT"

      - name: Restore vuln-db cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/megalint/vuln-db
          key: vuln-db-${{ runner.os }}-${{ steps.week.outputs.week }}
          restore-keys: |
            vuln-db-${{ runner.os }}-

      - name: Run MegaLinter via local composite action
        id: megalint
        uses: ./
        with:
          validate-all-codebase: ${{ github.event_name == 'schedule' }}
          vuln-cache-dir: ~/.cache/megalint/vuln-db
          # TODO: remove once the first attested custom-flavor image is published # DevSkim: ignore DS176209
          verify: skip

      - name: Upload MegaLinter reports
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: megalinter-reports
          path: |
            ${{ steps.megalint.outputs.reports-dir }}
            mega-linter.log

      - name: Upload SARIF to GitHub Code Scanning
        if: ${{ success() || failure() }}
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: ${{ steps.megalint.outputs.sarif-file }}
