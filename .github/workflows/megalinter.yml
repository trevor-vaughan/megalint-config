---
name: MegaLinter Dogfooding

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays at 6 AM UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run MegaLinter via local composite action
        id: megalint
        uses: ./
        with:
          validate-all-codebase: ${{ github.event_name == 'schedule' }}

      - name: Upload MegaLinter reports
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: megalinter-reports
          path: |
            ${{ steps.megalint.outputs.reports-dir }}
            mega-linter.log

      - name: Upload SARIF to GitHub Code Scanning
        if: ${{ success() || failure() }}
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: ${{ steps.megalint.outputs.sarif-file }}
