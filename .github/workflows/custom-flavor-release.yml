---
name: Custom Flavor Release

"on":
  schedule:
    - cron: "0 6 * * 0" # Weekly on Sunday 6 AM UTC — refreshes :latest only
  push:
    tags: ["v*"] # Tag pushes publish versioned, composite-tagged releases
  workflow_dispatch:
    inputs:
      base_image:
        description: "Base MegaLinter image (e.g. ghcr.io/oxsecurity/megalinter:v9.6.0)"
        required: false
        default: ""
        type: string

# Pin to the same version PR validation clones (.taskfiles/flavor.yml
# MEGALINTER_VERSION). Bump both together to adopt a new upstream base.
env:
  DEFAULT_BASE_IMAGE: ghcr.io/oxsecurity/megalinter:v9.6.0

permissions:
  contents: write # gh release create
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release Custom Flavor
    runs-on: ubuntu-latest
    environment: production # Use environment protection for additional security
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false # Don't cancel releases in progress
    env:
      # Build steps use docker/build-push-action (Docker), so Taskfile
      # tasks in this job must also use docker.  ubuntu-latest ships
      # podman, which Task would otherwise auto-select.
      CONTAINER_ENGINE: docker
      # Exposed as env so the Docker Hub login step's `if:` can detect
      # whether the secret is set, degrading gracefully when it is absent.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify actor has write access
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # The repo owner is a user account, not an org, so org-membership
          # cannot gate releases. Require the triggering actor to have write,
          # maintain, or admin permission on the repository instead.
          perm="$(gh api "repos/${REPO}/collaborators/${ACTOR}/permission" --jq '.permission')"
          case "${perm}" in
            admin|write|maintain)
              echo "Access granted: ${ACTOR} has '${perm}' permission" ;;
            *)
              echo "Access denied: ${ACTOR} has '${perm}' permission (need write/maintain/admin)"
              exit 1 ;;
          esac

      - name: Resolve upstream base version
        id: upstream
        env:
          DISPATCH_IMAGE: ${{ inputs.base_image }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Resolve base image: workflow_dispatch input > workflow-level default.
          BASE_IMAGE="${DISPATCH_IMAGE:-$DEFAULT_BASE_IMAGE}"
          echo "Base image: ${BASE_IMAGE}"

          # Extract registry/repo and tag from image reference.
          # e.g. ghcr.io/oxsecurity/megalinter:v9 -> repo=oxsecurity/megalinter tag=v9
          REPO="${BASE_IMAGE#ghcr.io/}"
          REPO="${REPO%%:*}"
          TAG="${BASE_IMAGE##*:}"

          # If the tag is already a full semver (e.g. v9.5.0), use it directly.
          # Otherwise resolve the floating tag (e.g. v9) to the highest
          # concrete semver tag via the GHCR container API.
          UPSTREAM_VERSION="${TAG#v}"
          if [[ "$UPSTREAM_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag is already a full semver: ${UPSTREAM_VERSION}"
          else
            echo "Resolving floating tag '${TAG}' to concrete version..."
            MAJOR="${UPSTREAM_VERSION%%.*}"

            # Query GHCR for all tags matching vMAJOR.*.* and pick the highest.
            # The OCI distribution API requires a token even for public images.
            GHCR_TOKEN="$(curl -fsSL \
              "https://ghcr.io/token?scope=repository:${REPO}:pull" \
              | jq -r '.token')"

            UPSTREAM_VERSION="$(curl -fsSL \
              -H "Authorization: Bearer ${GHCR_TOKEN}" \
              "https://ghcr.io/v2/${REPO}/tags/list" \
              | jq -r --arg m "v${MAJOR}" \
                '[.tags[] | select(startswith($m)) | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))]
                 | map(ltrimstr("v") | split(".") | map(tonumber))
                 | sort_by(.[0], .[1], .[2])
                 | last
                 | map(tostring) | join(".")')"

            if [[ -z "$UPSTREAM_VERSION" || "$UPSTREAM_VERSION" == "null" ]]; then
              echo "Error: could not resolve concrete version for tag '${TAG}' from ghcr.io/${REPO}"
              exit 1
            fi
            echo "Resolved to: ${UPSTREAM_VERSION}"
          fi

          # Validate semver format.
          IFS='.' read -r major minor patch <<< "$UPSTREAM_VERSION"
          if ! [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]]; then
            echo "Error: invalid semver '${UPSTREAM_VERSION}' (got ${major}.${minor}.${patch})"
            exit 1
          fi

          VERSION="${major}.${minor}.${patch}"
          echo "Upstream base version: ${VERSION}"

          echo "upstream_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "base_image=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "BASE_IMAGE=${BASE_IMAGE}" >> "$GITHUB_ENV"
          echo "FLAVOR_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Compute release identity
        id: identity
        env:
          REF_NAME: ${{ (github.event_name == 'push' && github.ref_type == 'tag') && github.ref_name || '' }}
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.upstream_version }}
        run: bash scripts/compute-release-version.sh >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false # Prevent cache-poisoning in release workflow

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          repo-token: ${{ github.token }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sync dependencies
        run: task dev:sync

      - name: Clone MegaLinter source
        run: task flavor:clone MEGALINTER_VERSION="${FLAVOR_VERSION}"

      - name: Generate custom flavor
        run: >-
          task flavor:generate
          FLAVOR_NAME=custom-flavor
          MEGALINTER_VERSION="${FLAVOR_VERSION}"

      - name: Validate flavor
        run: task flavor:validate

      - name: Prepare Docker build context
        id: context
        run: |
          set -euo pipefail
          # The upstream Dockerfile references files from the MegaLinter repo
          # (pyproject.toml, megalinter/, etc.), so the build context must be
          # the cached MegaLinter source — same approach as `task flavor:build`.
          CACHE_DIR=".cache/megalinter-v${FLAVOR_VERSION}"
          if [ ! -d "${CACHE_DIR}" ]; then
            echo "Error: MegaLinter cache directory not found at ${CACHE_DIR}"
            exit 1
          fi
          cp ./custom-flavor/mega-linter-flavor.yml "${CACHE_DIR}/mega-linter-flavor.yml"
          echo "context=${CACHE_DIR}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=./custom-flavor/Dockerfile" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # The shfmt/shellcheck/rust/alpine builder stages still pull
      # from Docker Hub; authenticate to avoid anonymous-pull throttling.
      # Skipped when the secret is absent so unattended releases without
      # Docker Hub credentials degrade to anonymous pulls instead of failing.
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for testing
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: ${{ steps.context.outputs.context }}
          file: ${{ steps.context.outputs.dockerfile }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: megalinter-custom-flavor:test
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            BUILD_REVISION=${{ github.sha }}
            BUILD_VERSION=${{ steps.identity.outputs.composite || steps.upstream.outputs.upstream_version }}

      - name: Smoke-test image
        run: task flavor:smoke-test MEGALINTER_IMAGE=megalinter-custom-flavor:test

      # Vulnerability scans are informational (exit-code: 0) because
      # most findings originate in the upstream MegaLinter base image
      # and its bundled language-specific packages, which we cannot
      # patch without breaking linter compatibility.  OS-layer packages
      # are already upgraded via `apk upgrade` in the generated
      # Dockerfile.  The SARIF output is still attested to the published
      # image so consumers have full transparency.
      - name: Scan image for vulnerabilities (table)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: megalinter-custom-flavor:test
          version: v0.70.0
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Scan image for vulnerabilities (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: megalinter-custom-flavor:test
          version: v0.70.0
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-image-results
          path: trivy-image-results.sarif
          retention-days: 90

      - name: Run MegaLinter repo scan
        id: repo-scan
        uses: ./
        with:
          validate-all-codebase: "true"
          megalinter-image: megalinter-custom-flavor:test
          pull-policy: never
          verify: skip

      - name: Assemble image tags
        id: imagetags
        env:
          OWNER: ${{ github.repository_owner }}
          COMPOSITE: ${{ steps.identity.outputs.composite }}
          MOVE_LATEST: ${{ steps.identity.outputs.move_latest }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${OWNER}/megalinter-custom-flavor"
          {
            echo "tags<<TAGS_EOF"
            if [ -n "${COMPOSITE}" ]; then
              echo "${IMAGE}:${COMPOSITE}"
            fi
            echo "${IMAGE}:sha-${COMMIT_SHA}"
            if [ "${MOVE_LATEST}" = "true" ]; then
              echo "${IMAGE}:latest"
            fi
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push multi-platform image
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: ${{ steps.context.outputs.context }}
          file: ${{ steps.context.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          provenance: mode=max
          sbom: true
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            BUILD_REVISION=${{ github.sha }}
            BUILD_VERSION=${{ steps.identity.outputs.composite || steps.upstream.outputs.upstream_version }}
          tags: ${{ steps.imagetags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=MegaLinter Custom Flavor
            org.opencontainers.image.description=Custom MegaLinter flavor generated from configuration
            org.opencontainers.image.version=${{ steps.identity.outputs.composite || steps.upstream.outputs.upstream_version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            org.opencontainers.image.licenses=MIT

      - name: Generate SLSA provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/megalinter-custom-flavor
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # SBOM generation is a release gate: megalint-verify.sh hard-fails
      # consumers without an SBOM attestation, so a failed generation
      # (or attestation, below) must fail the job and trigger untag
      # rather than publish an image consumers will reject.
      - name: Generate SBOM
        id: sbom
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/megalinter-custom-flavor@${{ steps.build.outputs.digest }}
          output-file: custom-flavor-sbom.spdx.json
          format: spdx-json

      - name: Upload SBOM
        if: always() && steps.sbom.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: custom-flavor-sbom
          path: custom-flavor-sbom.spdx.json
          retention-days: 90

      # ── Cosign attestations (SBOM, vuln scan, repo scan) ──────────
      # These attestations are verified by cosign verify-attestation in
      # megalint-verify.sh.  GitHub's actions/attest stores attestations
      # in the Artifact Attestation API, which is only queryable via
      # `gh attestation verify` — invisible to cosign.  Using cosign
      # attest writes the attestation as an OCI artifact on the registry,
      # making it verifiable with plain cosign in any environment (CI,
      # local, GitLab).
      #
      # Signing config without Rekor tlog: SBOM/SARIF payloads regularly
      # exceed Rekor's 16 MiB transparency-log entry limit.  We generate
      # a signing config that strips rekorTlogUrls so cosign signs and
      # pushes to the OCI registry without attempting a tlog upload.
      # The deprecated --tlog-upload=false flag no longer works with
      # cosign's default --signing-config; this is the replacement.
      - name: Generate cosign signing config (no tlog)
        id: signing-config
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/sigstore/root-signing/refs/heads/main/targets/signing_config.v0.2.json \
            | jq 'del(.rekorTlogUrls)' > cosign-signing-config.json

      - name: Attest SBOM
        id: attest-sbom
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
          REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes --type spdxjson \
            --predicate custom-flavor-sbom.spdx.json \
            --signing-config cosign-signing-config.json \
            "ghcr.io/${REPO_OWNER}/megalinter-custom-flavor@${IMAGE_DIGEST}"

      # vuln + repo-scan attestations are release gates too (no
      # continue-on-error): a failure fails the job so the untag step
      # below removes the already-pushed image and no release is cut.
      - name: Attest image vulnerability scan
        id: attest-vuln
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
          REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --type='https://cosign.sigstore.dev/attestation/vuln/v1' \
            --predicate trivy-image-results.sarif \
            --signing-config cosign-signing-config.json \
            "ghcr.io/${REPO_OWNER}/megalinter-custom-flavor@${IMAGE_DIGEST}"

      - name: Attest repository scan
        id: attest-repo-scan
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
          REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          SARIF_FILE: ${{ steps.repo-scan.outputs.sarif-file }}
        run: |
          cosign attest --yes \
            --type='https://megalinter.io/attestation/repo-scan/v1' \
            --predicate "${SARIF_FILE}" \
            --signing-config cosign-signing-config.json \
            "ghcr.io/${REPO_OWNER}/megalinter-custom-flavor@${IMAGE_DIGEST}"

      # Fail closed: if any step after the image was pushed fails
      # (provenance, a gating attestation, etc.), delete the just-pushed
      # manifest so no consumable tag — including a moved :latest —
      # points at an unattested image.  GITHUB_TOKEN can delete versions
      # of packages this repo published (it holds package-admin by
      # default), so no PAT is required.  Deleting the index-manifest
      # version removes every tag that resolves to it.  This step is
      # best-effort cleanup and never masks the original failure.
      - name: Untag unattested image on failure
        if: failure() && steps.build.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: megalinter-custom-flavor
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          echo "Publish/attestation failed — removing unattested image ${IMAGE_DIGEST}"
          version_id="$(gh api --paginate \
            "/users/${OWNER}/packages/container/${PACKAGE}/versions" \
            --jq "[.[] | select(.name == \"${IMAGE_DIGEST}\")][0].id // empty")"
          if [ -z "${version_id}" ]; then
            echo "WARNING: no package version found for digest ${IMAGE_DIGEST}; manual cleanup may be required" >&2
            exit 0
          fi
          # GHCR refuses to delete the last remaining tagged version of a
          # package; tolerate any delete error rather than masking the
          # build failure that triggered this cleanup.
          if gh api --method DELETE \
            "/users/${OWNER}/packages/container/${PACKAGE}/versions/${version_id}"; then
            echo "Deleted unattested image version ${version_id} (${IMAGE_DIGEST})"
          else
            echo "WARNING: could not delete version ${version_id} (${IMAGE_DIGEST}); manual cleanup may be required" >&2
          fi

      - name: Create GitHub release
        if: steps.identity.outputs.create_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          COMPOSITE: ${{ steps.identity.outputs.composite }}
          RELEASE_VERSION: ${{ steps.identity.outputs.release_version }}
          IS_PRERELEASE: ${{ steps.identity.outputs.is_prerelease }}
          MOVE_LATEST: ${{ steps.identity.outputs.move_latest }}
          BASE_IMAGE_REF: ${{ steps.upstream.outputs.base_image }}
          REPO_OWNER: ${{ github.repository_owner }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${REPO_OWNER}/megalinter-custom-flavor"
          PRERELEASE_FLAG=""
          if [ "${IS_PRERELEASE}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          LATEST_LINE=""
          if [ "${MOVE_LATEST}" = "true" ]; then
            LATEST_LINE="- \`${IMAGE}:latest\` (moved to this release)"
          fi
          cat <<EOF | gh release create "${RELEASE_TAG}" ${PRERELEASE_FLAG} \
            --title "Custom Flavor ${RELEASE_TAG} (${COMPOSITE})" \
            --notes-file -
          ## MegaLinter Custom Flavor ${RELEASE_VERSION}

          Custom MegaLinter flavor generated from configuration.
          Base image: \`${BASE_IMAGE_REF}\`

          ### Image Tags
          - \`${IMAGE}:${COMPOSITE}\` (immutable)
          - \`${IMAGE}:sha-${COMMIT_SHA}\`
          ${LATEST_LINE}

          ### Reproducibility
          Pin the composite tag above or a digest. \`:latest\` always tracks the
          freshest build and is not stable.

          ### Details
          - Supply chain attestation: SLSA provenance + SBOM + vulnerability scan + repo scan
          - Multi-platform: linux/amd64, linux/arm64

          **Commit:** ${COMMIT_SHA}
          EOF
