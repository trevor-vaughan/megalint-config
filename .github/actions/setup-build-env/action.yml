---
name: Setup Build Environment
description: Install uv and Task into the runner (repo must already be checked out)

inputs:
  enable-uv:
    description: Whether to install uv
    required: false
    default: "true"
  enable-bats:
    description: Whether to install bats (only needed for the shell-test gate)
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install uv
      if: inputs.enable-uv == 'true'
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true

    - name: Install Task
      uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      with:
        repo-token: ${{ github.token }}

    - name: Install bats
      if: inputs.enable-bats == 'true'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y bats
