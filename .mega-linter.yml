# =============================================================================
# Shared MegaLinter Configuration
# =============================================================================
#
# Linting configuration optimized for infrastructure repositories.
# Provides comprehensive security scanning, code quality, and IaC validation.
#
# Usage in other repos:
#   EXTENDS: https://github.com/<owner>/<repo>/raw/main/.mega-linter.yml
#
# Documentation: https://megalinter.io/latest/supported-linters/
# =============================================================================

# =============================================================================
# Core Configuration
# =============================================================================

# Global settings
IGNORE_GITIGNORED_FILES: true
PRINT_ALPACA: false
SARIF_REPORTER: true

# Auto-fixing: Set APPLY_FIXES=all when running locally to enable auto-fixes
# for linters that support it. Not all linters can auto-fix:
#   - Analysis-only: BASH_SHELLCHECK (detection only, manual fixes required)
#   - Formatters: BASH_SHFMT, MARKDOWN_MARKDOWNLINT, PYTHON_RUFF (auto-fix)
# Reference: https://megalinter.io/latest/config-apply-fixes/

# Exclude tool directories and temporary files
ADDITIONAL_EXCLUDED_DIRECTORIES:
  - ".agents" # AI agent configurations
  - ".claude" # Claude AI configurations
  - ".cursor" # Cursor IDE configurations
  - ".mega-linter.d" # Shared linter sub-configs (staged at workspace root by the runner)
  - ".opencode" # OpenCode framework
  - ".specify" # SpecKit framework
  - ".test-output" # Test artifacts
  - ".uf" # Unbound Force tooling
  - ".venv" # Python virtual environments
  - "openspec" # OpenSpec specifications
  - "specs" # SpecKit specifications

# =============================================================================
# Enabled Linters
# =============================================================================
# SYNC: when adding or removing linters below, also update the ENABLE_LINTERS
# list in .mega-linter.d/.mega-linter-changed.yml (minus REPOSITORY_* entries).

ENABLE_LINTERS:
  # ---------------------------------------------------------------------------
  # Core Languages (present in this repository)
  # ---------------------------------------------------------------------------
  # BASH_SHELLCHECK: Analysis-only linter (no auto-fix support in MegaLinter).
  # While standalone shellcheck has --format=diff, MegaLinter does not integrate
  # this feature. Use BASH_SHFMT for auto-formatting shell scripts.
  # References:
  #   - https://megalinter.io/latest/descriptors/bash_shellcheck/
  #   - https://megalinter.io/latest/descriptors/bash_shfmt/
  - BASH_SHELLCHECK # Shell script analysis (no auto-fix)
  - BASH_SHFMT # Shell script formatting (supports auto-fix)
  - PYTHON_RUFF # Modern Python linter + formatter (replaces flake8/pylint/black)
  - PYTHON_ISORT # Python import sorting

  # ---------------------------------------------------------------------------
  # Configuration File Formats
  # ---------------------------------------------------------------------------
  - JSON_JSONLINT # JSON syntax validation
  - YAML_YAMLLINT # YAML syntax validation
  - YAML_PRETTIER # YAML formatting (supports auto-fix)
  - MARKDOWN_MARKDOWNLINT # Markdown formatting
  - MARKDOWN_MARKDOWN_LINK_CHECK # Markdown link checking
  - MARKDOWN_MARKDOWN_TABLE_FORMATTER # Markdown table formatting (supports auto-fix)
  - EDITORCONFIG_EDITORCONFIG_CHECKER # Cross-editor consistency

  # ---------------------------------------------------------------------------
  # Infrastructure-as-Code (valuable for org-wide reuse)
  # ---------------------------------------------------------------------------
  - ACTION_ZIZMOR # GitHub Actions security scanner
  - ACTION_ACTIONLINT # GitHub Actions workflow validation
  - DOCKERFILE_HADOLINT # Dockerfile best practices
  - KUBERNETES_KUBECONFORM # Kubernetes manifest validation
  - TERRAFORM_TFLINT # Terraform configuration validation
  - CLOUDFORMATION_CFN_LINT # AWS CloudFormation validation

  # ---------------------------------------------------------------------------
  # Security & Compliance (multi-layer defense)
  # ---------------------------------------------------------------------------
  - REPOSITORY_CHECKOV # Infrastructure security scanning
  - REPOSITORY_DEVSKIM # Security pattern detection
  - REPOSITORY_GRYPE # Vulnerability scanning
  - REPOSITORY_KICS # Infrastructure security analysis
  - REPOSITORY_GITLEAKS # Secrets detection
  - REPOSITORY_SECRETLINT # Secrets detection
  - REPOSITORY_TRIVY # Container/dependency security
  - REPOSITORY_TRUFFLEHOG # Additional secrets detection

  # ---------------------------------------------------------------------------
  # Code Quality & Documentation
  # ---------------------------------------------------------------------------
  - COPYPASTE_JSCPD # Copy-paste detection

# =============================================================================
# Disabled Linters
# =============================================================================

DISABLE_LINTERS:
  # Python - redundant with ruff
  - PYTHON_BLACK # Replaced by PYTHON_RUFF (ruff format)
  - PYTHON_FLAKE8 # Replaced by PYTHON_RUFF
  - PYTHON_PYLINT # Replaced by PYTHON_RUFF
  - PYTHON_MYPY # Type checking not needed for infrastructure scripts
  - PYTHON_PYRIGHT # Redundant with mypy

  # Security - high false positive rate
  - PYTHON_BANDIT # 94 false positive assert warnings in test files

  # Other
  - REPOSITORY_KINGFISHER # Redundant with other security tools

# =============================================================================
# Linter-Specific Configuration
# =============================================================================

# Python: Comprehensive ruff rule selection
PYTHON_RUFF_ARGUMENTS:
  - "--select=E,W,F,I,N,UP,YTT,BLE,B,A,COM,C4,DTZ,T10,DJ,EM,EXE,ICN,G,INP,PIE,T20,PT,Q,RSE,RET,SLF,SIM,TID,TCH,INT,ARG,PTH,TD,FIX,ERA,PD,PGH,PL,TRY,FLY,NPY,PERF,FURB,LOG,RUF"

# Markdown: Disable language specification requirement for code blocks
MARKDOWN_MARKDOWNLINT_ARGUMENTS:
  - "--disable"
  - "MD040" # Fenced code blocks should have a language specified

# Markdown: Skip AI assistant instruction files. AGENTS.md and CLAUDE.md
# are LLM-targeted prose that follows agent-host conventions, not the
# markdown style rules we enforce on human-facing docs.
MARKDOWN_FILTER_REGEX_EXCLUDE: '(^|/)(AGENTS|CLAUDE)\.md$'

# Hadolint: Per-file mode ensures inline ignore pragmas work correctly.
# In list_of_files mode (default), hadolint can misattribute inline ignores.
DOCKERFILE_HADOLINT_CLI_LINT_MODE: file

# KICS: Query and path exclusions are in kics.config. In this repo it lives
# in .mega-linter.d/ and is overlaid at the workspace root by the runner.
# REPOSITORY_KICS_ARGUMENTS is not reliably passed for REPOSITORY-scoped linters.
REPOSITORY_KICS_ARGUMENTS:
  - "--minimal-ui"
  - "--no-color"
  - "--fail-on=high,medium"

# Checkov: The `github_configuration` framework works on the read-only
# workspace mount because megalint-run.sh sets CKV_GITHUB_CONF_DIR_NAME
# (NOT _PATH — Checkov ignores _PATH and recomputes it from cwd + _NAME,
# so we feed _NAME an absolute path on the tmpfs). See megalint-run.sh
# for the full explanation.
#
# Path and rule exclusions live in .checkov.yml (project root). A shared
# template is in .mega-linter.d/.checkov.yml; targets override it by
# placing their own .checkov.yml at the repo root.
#
# NOTE: FILTER_REGEX_EXCLUDE does NOT work for REPOSITORY-scoped linters
# because Checkov runs in `project` CLI lint mode and scans the directory
# tree itself, bypassing MegaLinter file filtering.
REPOSITORY_CHECKOV_CONFIG_FILE: .checkov.yml

# DevSkim: Rule and path exclusions are in .devskim.json. In this repo it
# lives in .mega-linter.d/ and is overlaid at the workspace root by the runner.
REPOSITORY_DEVSKIM_CONFIG_FILE: .devskim.json

# Secretlint: Path exclusions are in .secretlintignore (project root).
# REPOSITORY_SECRETLINT_ARGUMENTS is not used; secretlint reads .secretlintignore.
REPOSITORY_SECRETLINT_ARGUMENTS:
  - "--secretlintignore"
  - ".secretlintignore"

# Enable GITHUB_TOKEN for zizmor security scanner
ACTION_ZIZMOR_UNSECURED_ENV_VARIABLES:
  - GITHUB_TOKEN

# =============================================================================
# Development/Debugging (uncomment as needed)
# =============================================================================

#LOG_LEVEL: DEBUG
