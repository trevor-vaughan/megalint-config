---
name: "MegaLinter (shared config)"
description: >-
  Run MegaLinter with the shared config from trevor-vaughan/megalint-config
  against a working directory. The caller is responsible for checkout,
  artifact upload, and SARIF upload to Code Scanning.
author: "Trevor Vaughan"
branding:
  icon: "check-circle"
  color: "green"

inputs:
  working-directory:
    description: "Directory to lint. Defaults to GITHUB_WORKSPACE."
    required: false
    default: ${{ github.workspace }}
  validate-all-codebase:
    description: >-
      Selects the lint scope. Must be "true" or "false". "false" (default)
      runs the changed-files task (megalint:changed): file-level linters diff
      against the default branch and REPOSITORY_* linters (Checkov, TruffleHog,
      Trivy, secret scanners) are skipped, since they scan the whole repo
      regardless and add no incremental value on a changed-file run. "true"
      runs the full task (megalint:run) with every enabled linter over the
      entire codebase. Also forwarded to MegaLinter as VALIDATE_ALL_CODEBASE.
    required: false
    default: "false"
  megalinter-image:
    description: "MegaLinter container image to run."
    required: false
    default: "ghcr.io/trevor-vaughan/megalinter-custom-flavor:latest"
  reports-dir:
    description: >-
      Where reports land on host after the run. Defaults to
      <working-directory>/megalinter-reports. Action moves reports there
      post-run if it differs from the default.
    required: false
    default: ""
  pull-policy:
    description: "Engine --pull= policy: always | missing | never."
    required: false
    default: "missing"
  verify:
    description: >-
      Attestation verification mode. Set to "skip" to bypass
      attestation checks (useful when the image has not yet been
      published with attestations). Empty string (default) verifies
      SBOM, vulnerability scan, and repository scan via cosign, and
      SLSA provenance via the GitHub CLI.
    required: false
    default: ""
  vuln-cache-dir:
    description: >-
      Host path for persistent trivy/grype vulnerability-DB cache.
      Bind-mounted into the container so DBs survive between runs.
      Set to empty string to disable caching.
    required: false
    default: "~/.cache/megalint/vuln-db"
  github-comment:
    description: >-
      Post a summary comment on the pull request with lint results.
      Requires pull-requests: write permission. Opt-in because
      external callers may not grant that permission.
    required: false
    default: "false"
  timeout-minutes:
    description: >-
      Maximum wall-clock minutes for the MegaLinter run before it is
      terminated. Guards against a hung linter consuming the whole job.
      Composite-action steps cannot use the native timeout-minutes key,
      so this is enforced with coreutils `timeout`. Must be a positive
      integer.
    required: false
    default: "45"

outputs:
  reports-dir:
    description: "Resolved absolute path to the reports directory."
    value: ${{ steps.publish.outputs.reports-dir }}
  sarif-file:
    description: "Absolute path to megalinter-report.sarif inside reports-dir."
    value: ${{ steps.publish.outputs.sarif-file }}

runs:
  using: composite
  steps:
    - name: Install Task
      uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      with:
        repo-token: ${{ github.token }}

    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Resolve reports-dir
      id: resolve
      shell: bash
      env:
        INPUT_WORKING_DIR: ${{ inputs.working-directory }}
        INPUT_REPORTS_DIR: ${{ inputs.reports-dir }}
      run: |
        set -euo pipefail
        working_dir="${INPUT_WORKING_DIR}"
        reports="${INPUT_REPORTS_DIR}"
        if [ -z "${reports}" ]; then
          reports="${working_dir}/megalinter-reports"
        fi
        # Normalize to absolute path (does not require the dir to exist)
        reports_abs="$(realpath -m "${reports}")"
        default_abs="$(realpath -m "${working_dir}/megalinter-reports")"
        echo "reports=${reports_abs}" >> "$GITHUB_OUTPUT"
        echo "default=${default_abs}" >> "$GITHUB_OUTPUT"

    - name: Run MegaLinter via shared Taskfile
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_WORKING_DIR: ${{ inputs.working-directory }}
        INPUT_MEGALINTER_IMAGE: ${{ inputs.megalinter-image }}
        INPUT_PULL_POLICY: ${{ inputs.pull-policy }}
        INPUT_VALIDATE_ALL: ${{ inputs.validate-all-codebase }}
        INPUT_VULN_CACHE: ${{ inputs.vuln-cache-dir }}
        INPUT_VERIFY: ${{ inputs.verify }}
        GITHUB_COMMENT_REPORTER: ${{ inputs.github-comment }}
        INPUT_TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
      run: |
        set -euo pipefail
        # Expand ~ since env vars from inputs are literal strings
        vuln_cache="${INPUT_VULN_CACHE/#\~/$HOME}"
        export MEGALINT_VULN_CACHE="${vuln_cache}"

        # Composite-action steps do not support the native timeout-minutes key,
        # so bound the run with coreutils `timeout`. Validate the input is a
        # positive integer before interpolating it into the command.
        if ! [[ "${INPUT_TIMEOUT_MINUTES}" =~ ^[1-9][0-9]*$ ]]; then
          echo "::error::timeout-minutes must be a positive integer (got: '${INPUT_TIMEOUT_MINUTES}')"
          exit 1
        fi

        # Select the MegaLinter task from validate-all-codebase. REPOSITORY_*
        # linters (Checkov, TruffleHog, Trivy, secret scanners) ignore
        # VALIDATE_ALL_CODEBASE and always scan the whole repo, so on a
        # changed-file run they add cost without incremental value. The
        # megalint:changed task swaps in a config whose ENABLE_LINTERS omits
        # every REPOSITORY_* entry and pins VALIDATE_ALL_CODEBASE=false;
        # megalint:run keeps the full set for a complete scan.
        case "${INPUT_VALIDATE_ALL}" in
          true) megalint_task="megalint:run" ;;
          false) megalint_task="megalint:changed" ;;
          *)
            echo "::error::validate-all-codebase must be 'true' or 'false' (got: '${INPUT_VALIDATE_ALL}')"
            exit 1
            ;;
        esac

        # --kill-after escalates to SIGKILL if the run ignores the initial
        # SIGTERM, so the step is guaranteed to return even if a linter wedges.
        rc=0
        timeout --kill-after=30s "${INPUT_TIMEOUT_MINUTES}m" \
          task -y "${megalint_task}" \
            TARGET="${INPUT_WORKING_DIR}" \
            MEGALINTER_IMAGE="${INPUT_MEGALINTER_IMAGE}" \
            PULL_POLICY="${INPUT_PULL_POLICY}" \
            VALIDATE_ALL_CODEBASE="${INPUT_VALIDATE_ALL}" \
            MEGALINT_VERIFY="${INPUT_VERIFY}" || rc=$?

        # timeout exits 124 when it had to terminate the run.
        if [ "${rc}" -eq 124 ]; then
          echo "::error::MegaLinter exceeded the ${INPUT_TIMEOUT_MINUTES}-minute timeout and was terminated."
        fi
        exit "${rc}"

    - name: Relocate reports if requested
      if: ${{ always() }}
      shell: bash
      env:
        RESOLVE_DEFAULT: ${{ steps.resolve.outputs.default }}
        RESOLVE_REPORTS: ${{ steps.resolve.outputs.reports }}
        INPUT_WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        default="${RESOLVE_DEFAULT}"
        target="${RESOLVE_REPORTS}"
        working_dir="${INPUT_WORKING_DIR}"

        # Always move the log into the default reports-dir first (if both exist),
        # so the log travels with the reports regardless of relocation.
        if [ -f "${working_dir}/mega-linter.log" ] && [ -d "${default}" ]; then
          mv "${working_dir}/mega-linter.log" "${default}/"
        fi

        # Then optionally relocate the whole reports-dir to a non-default target.
        # Guard with -d so a MegaLinter crash before reports were written doesn't
        # mask the original failure with a missing-source mv error.
        if [ "${default}" != "${target}" ] && [ -d "${default}" ]; then
          mkdir -p "$(dirname "${target}")"
          rm -rf "${target}"
          mv "${default}" "${target}"
        fi

    - name: Publish outputs
      id: publish
      if: ${{ always() }}
      shell: bash
      env:
        RESOLVE_REPORTS: ${{ steps.resolve.outputs.reports }}
      run: |
        set -euo pipefail
        target="${RESOLVE_REPORTS}"
        echo "reports-dir=${target}" >> "$GITHUB_OUTPUT"
        echo "sarif-file=${target}/megalinter-report.sarif" >> "$GITHUB_OUTPUT"

    - name: Write job summary
      if: ${{ always() }}
      shell: bash
      env:
        RESOLVE_REPORTS: ${{ steps.resolve.outputs.reports }}
      run: |
        set -euo pipefail
        report="${RESOLVE_REPORTS}/megalinter-report.md"
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f "${report}" ]; then
          cat "${report}" >> "$GITHUB_STEP_SUMMARY"
        fi
