# Local MegaLinter overrides for this repository.
#
# The runner detects this file and passes MEGALINTER_CONFIG=.mega-linter.local.yml
# to MegaLinter, staging the shared .mega-linter.yml as .mega-linter.shared.yml
# so we can inherit from it with EXTENDS.
#
# Put repo-specific exclusions and overrides here. The shared config must
# stay generic — it applies to every target the runner is pointed at.
#
# Local overrides are honoured on BOTH full runs and changed-files runs. On a
# changed run the runner injects a reduced ENABLE_LINTERS (full minus
# REPOSITORY_*) via env; this file remains the entry config, so its exclusions
# and settings still apply.

EXTENDS: .mega-linter.shared.yml

# MegaLinter's EXTENDS replaces list values by default. Opt into append
# mode for ADDITIONAL_EXCLUDED_DIRECTORIES so we only declare the delta.
CONFIG_PROPERTIES_TO_APPEND:
  - ADDITIONAL_EXCLUDED_DIRECTORIES

ADDITIONAL_EXCLUDED_DIRECTORIES:
  - "custom-flavor"
